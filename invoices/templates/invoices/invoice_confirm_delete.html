{% extends 'invoices/base.html' %}

{% block title %}Delete Invoice {{ invoice.invoice_number }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5>Delete Invoice</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete invoice <strong>{{ invoice.invoice_number }}</strong>?</p>
                <p>This action cannot be undone.</p>

                <div class="d-flex gap-2 mt-3">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </form>
                    <a href="{% url 'invoices:detail' invoice.pk %}" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
